spec_version: 1
name: HelixDesk OpenEnv
version: 1.0.0
type: space
runtime: fastapi
app: server.app:app
port: 7860
task: customer-support-triage
tags: [openenv]
entry_point: helixdesk.env:HelixDeskEnv

reward:
  type: continuous
  range: [-1.0, 1.0]

endpoints:
  - path: /reset
    method: POST
  - path: /step
    method: POST
  - path: /state
    method: GET
  - path: /tasks
    method: GET
  - path: /grader
    method: POST
  - path: /health
    method: GET

tasks:
  - id: easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the customer support triage 0.0 to 1.0 based on correct classification..."

  - id: medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the SLA-aware support triage 0.0 to 1.0 based on accuracy and priority handling..."

  - id: hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "Score the trend analysis and support triage 0.0 to 1.0 based on accuracy..."

  - id: expert
    difficulty: hard
    max_steps: 25
    grader:
      type: llm
      prompt_template: "Score the expert-level full support resolution 0.0 to 1.0 based on all criteria..."
