spec_version: 1
name: HelixDesk OpenEnv
version: 1.0.0
type: space
runtime: fastapi
app: server.app:app
port: 7860
task: customer-support-triage
tags: [openenv]
entry_point: helixdesk.env:HelixDeskEnv

reward:
  type: continuous
  range: [-1.0, 1.0]

endpoints:
  
path: /reset
  method: POST
path: /step
method: POST
path: /state
method: GET
path: /tasks
method: GET
path: /grader
method: POST
path: /health
method: GET

tasks:
  
id: easy
  grader: tasks.easy_classify:grade

  
id: medium
  grader: tasks.medium_sla:grade

  
id: hard
  grader: tasks.hard_trend:grade

  
id: expert
  grader: tasks.expert_full:grade
